<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Travel Online | Mantra Travels</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">Mantra <span>Travels</span></div>
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle Menu">☰</button>
        <nav id="navMenu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="destinations.html">Destinations</a></li>
                <li><a href="packages.html">Packages</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="booking.html" class="active">Booking</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main style="max-width: 650px;">
        <h1 class="page-title">Trip Registration</h1>
        <p class="page-subtitle">Submit your verification details securely below to secure current slots.</p>
        
        <form onsubmit="event.preventDefault(); alert('Submission Complete! Our reservation desk will email your digital itinerary details shortly.');">
            <div>
                <label>Full Legal Name</label>
                <input type="text" required placeholder="e.g. Alex Johnson">
            </div>
            <div>
                <label>Contact Email Address</label>
                <input type="email" required placeholder="alex@example.com">
            </div>
            <div>
                <label>Select Desired Package Tier</label>
                <select>
                    <option>Heritage Explorer - $349</option>
                    <option>Coastal Luxury - $299</option>
                    <option>Alpine Cabin - $419</option>
                </select>
            </div>
            <div>
                <label>Target Travel Commencement Date</label>
                <input type="date" required>
            </div>
            <button type="submit" class="cta-btn" style="width: 100%; border: none; font-size:16px; cursor: pointer; margin-top: 10px;">Submit Reservation Request</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Mantra Travel Agency. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
