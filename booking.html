<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Travel Online | Mantra Travels</title>
    <meta name="description" content="Register your details securely using our clean, modern online trip reservation form.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">Mantra <span>Travels</span></div>
        <button class="menu-toggle" id="menuToggle" aria-label="Open Menu">☰</button>
        <nav id="navMenu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="destinations.html">Destinations</a></li>
                <li><a href="packages.html">Packages</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="booking.html" class="active">Booking</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main style="max-width: 600px;">
        <h1 class="page-title">Trip Booking Registration</h1>
        <p class="page-subtitle">Submit the form below to lock in your seasonal prices.</p>
        
        <form onsubmit="event.preventDefault(); alert('Thank you! Your details have been submitted. A travel coordinator will email your receipt shortly.');" style="background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
            <div style="margin-bottom: 15px;">
                <label style="display:block; margin-bottom: 5px; font-weight:600;">Full Name</label>
                <input type="text" required placeholder="Chris Evans" style="width:100%; padding: 10px; border: 1px solid #ccc; border-radius:4px;">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display:block; margin-bottom: 5px; font-weight:600;">Email Address</label>
                <input type="email" required placeholder="chris@example.com" style="width:100%; padding: 10px; border: 1px solid #ccc; border-radius:4px;">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display:block; margin-bottom: 5px; font-weight:600;">Target Package</label>
                <select style="width:100%; padding: 10px; border: 1px solid #ccc; border-radius:4px;">
                    <option>Heritage Classic - $349</option>
                    <option>Beach Front Luxury - $299</option>
                    <option>Mountain Log Cabin - $419</option>
                </select>
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display:block; margin-bottom: 5px; font-weight:600;">Target Departure Date</label>
                <input type="date" required style="width:100%; padding: 10px; border: 1px solid #ccc; border-radius:4px;">
            </div>
            <button type="submit" class="cta-btn" style="width: 100%; border: none; font-size:16px; cursor: pointer;">Submit Reservation Enquiry</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Mantra Travel Agency. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
